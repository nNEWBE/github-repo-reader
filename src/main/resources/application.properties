# Application
spring.application.name=github-repo-reader
server.port=8080

# H2 Persistent Database (file-based)
spring.datasource.url=jdbc:h2:file:./data/github_repo_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (for debugging, disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.example.github_repo_reader=INFO

# GitHub Sync Configuration
app.github.owner=abusaeed2433
app.github.repo=JavaInREADME
app.github.api-base-url=https://api.github.com
app.github.sync-cron=0 0 */12 * * *

# Related repositories to track for contributions
app.github.related-repos=JavaInREADME,JavaInReadmeBackend,java-in-readme-site
